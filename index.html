<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排列五 數據分析與看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-weight: bold;
      font-size: 14px;
      margin: 0 2px;
    }
    .ball-red { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .ball-amber { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col justify-between">

  <!-- 頂部標題 -->
  <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-amber-500 rounded-lg text-slate-900 font-extrabold text-xl">P5</div>
        <div>
          <h1 class="text-xl font-bold text-amber-400">排列五 數據分析看板</h1>
          <p class="text-xs text-slate-400">即時數據連線與演算系統</p>
        </div>
      </div>
      <button onclick="loadData()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-4 py-2 rounded-lg text-xs transition flex items-center gap-2 shadow">
        <i class="fa-solid fa-rotate-right" id="refreshIcon"></i>
        <span>重新同步數據</span>
      </button>
    </div>
  </header>

  <!-- 主內容區 -->
  <main class="max-w-6xl mx-auto p-4 w-full flex-grow space-y-6">

    <!-- 狀態顯示區 -->
    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700">
      <span class="text-xs text-slate-400">當前連線狀態：</span>
      <span id="statusText" class="text-xs font-medium text-amber-400">正在準備數據...</span>
    </div>

    <!-- 預測號碼展示 -->
    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
      <h2 class="text-lg font-bold text-emerald-400 mb-3 flex items-center gap-2">
        <i class="fa-solid fa-wand-magic-sparkles"></i> 今日推薦 5 組排列五號碼
      </h2>
      <div id="recommendContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="text-xs text-slate-400 col-span-2">數據載入中...</div>
      </div>
    </div>

    <!-- 開獎紀錄表格 -->
    <div class="bg-slate-800 rounded-xl shadow-xl overflow-hidden border border-slate-700">
      <div class="p-4 bg-slate-800 border-b border-slate-700">
        <h2 class="text-base font-bold text-slate-200">最新開獎紀錄</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-700/50 text-slate-300 text-xs">
              <th class="p-4">期號</th>
              <th class="p-4">開獎號碼</th>
              <th class="p-4">開獎日期</th>
            </tr>
          </thead>
          <tbody id="lotteryTable" class="divide-y divide-slate-700 text-sm">
            <tr><td colspan="3" class="p-4 text-center text-slate-400">正在載入數據...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- 頁尾 -->
  <footer class="bg-slate-800 border-t border-slate-700 py-4 text-center text-xs text-slate-400">
    <p>© 2026 排列五數據分析系統</p>
  </footer>

  <!-- 腳本區域 -->
  <script>
    // 預設備用數據（若網路請求超時會自動使用）
    const defaultData = [
      { period: "26015", balls: [3, 8, 5, 1, 9], date: "2026-01-15" },
      { period: "26014", balls: [0, 7, 2, 6, 4], date: "2026-01-14" },
      { period: "26013", balls: [9, 1, 5, 8, 3], date: "2026-01-13" },
      { period: "26012", balls: [4, 6, 0, 2, 7], date: "2026-01-12" },
      { period: "26011", balls: [8, 3, 9, 5, 1], date: "2026-01-11" }
    ];

    async function loadData() {
      const statusText = document.getElementById('statusText');
      const refreshIcon = document.getElementById('refreshIcon');

      refreshIcon.classList.add('fa-spin');
      statusText.className = 'text-xs font-medium text-amber-400';
      statusText.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> 正在獲取數據...';

      const timestamp = new Date().getTime();
      const targetApi = `https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry?gameNo=350133&provinceId=0&pageSize=10&isVerify=1&pageNo=1&_=${timestamp}`;
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetApi)}`;

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 秒超時

        const response = await fetch(proxyUrl, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (response.ok) {
          const resData = await response.json();
          if (resData && resData.value && resData.value.list) {
            const list = resData.value.list.map(item => ({
              period: item.lotteryDrawNum,
              balls: item.lotteryDrawResult.trim().split(/\s+/).map(n => parseInt(n, 10)),
              date: item.lotteryDrawTime
            }));
            
            renderUI(list);
            statusText.className = 'text-xs font-medium text-emerald-400';
            statusText.innerHTML = `<i class="fa-solid fa-check mr-1"></i> 已成功載入官方最新數據！(${new Date().toLocaleTimeString()})`;
            refreshIcon.classList.remove('fa-spin');
            return;
          }
        }
      } catch (e) {
        console.warn('API請求超時或被攔截，切換至備用數據');
      }

      // 如果 API 連線失敗，顯示備用數據
      renderUI(defaultData);
      statusText.className = 'text-xs font-medium text-slate-400';
      statusText.innerHTML = `<i class="fa-solid fa-circle-info mr-1"></i> 已顯示預設示範數據（跨域連線受限）`;
      refreshIcon.classList.remove('fa-spin');
    }

    function renderUI(dataList) {
      // 渲染表格
      const tableBody = document.getElementById('lotteryTable');
      let tableHtml = '';
      dataList.forEach(item => {
        let ballsHtml = item.balls.map(n => `<span class="ball ball-red">${n}</span>`).join('');
        tableHtml += `
          <tr class="hover:bg-slate-700/30">
            <td class="p-4 font-mono font-bold text-amber-300">${item.period}</td>
            <td class="p-4">${ballsHtml}</td>
            <td class="p-4 text-slate-400">${item.date}</td>
          </tr>
        `;
      });
      tableBody.innerHTML = tableHtml;

      // 渲染預測號碼
      const recContainer = document.getElementById('recommendContainer');
      let recHtml = '';
      for (let i = 1; i <= 6; i++) {
        // 隨機生成示範組合
        let randomCombo = Array.from({length: 5}, () => Math.floor(Math.random() * 10));
        let ballsStr = randomCombo.map(n => `<span class="ball ball-amber">${n}</span>`).join('');
        recHtml += `
          <div class="bg-slate-900 p-3 rounded-lg border border-slate-700 flex justify-between items-center">
            <span class="text-xs text-slate-300 font-bold">精選組合 ${i}</span>
            <div>${ballsStr}</div>
          </div>
        `;
      }
      recContainer.innerHTML = recHtml;
    }

    // 網頁載入後執行一次
    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
